<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增客單系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; padding: 20px; }
    .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <div class="container max-w-md mx-auto card p-4">
    <h4 class="text-center mb-4">📝 新增客單</h4>
    
    <form id="orderForm">
      <div class="mb-3">
        <label class="form-label">用途</label>
        <input type="text" class="form-control" id="purpose" required placeholder="例如：找房人">
      </div>
      
      <div class="mb-3">
        <label class="form-label">客戶姓名</label>
        <input type="text" class="form-control" id="customerName" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label">金額</label>
        <input type="number" class="form-control" id="amount" required placeholder="請輸入純數字">
      </div>
      
      <div class="mb-3">
        <label class="form-label">地區</label>
        <select class="form-select" id="region" required>
          <option value="" selected disabled>請選擇地區</option>
          <option value="台北">台北</option>
          <option value="桃園">桃園</option>
          <option value="台中">台中</option>
          <option value="高雄">高雄</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">單別</label>
        <select class="form-select" id="orderType" required>
          <option value="" selected disabled>請選擇單別</option>
          <option value="外部資訊">外部資訊 (扣30點)</option>
          <option value="內部資訊">內部資訊 (扣120點)</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">電話</label>
        <input type="tel" class="form-control" id="phone" required placeholder="例如：0912345678">
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-3" id="submitBtn">送出資料</button>
    </form>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <script>
    // 替換成你的 LIFF ID
    const LIFF_ID = "你的_LIFF_ID_請填這"; 
    // 替換成你剛剛部署的 Apps Script Web App URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxC0R3W3oCXh0NFr5OUertcVIBMooDlX7PtOxyV8kC8X4ONiaYOaJvccBYiMlejgHoN/exec";

    let profileData = {};

    // 初始化 LIFF
    async function initializeLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          // 抓取使用者的 LINE ID 與 姓名
          profileData = await liff.getProfile();
        } else {
          // 確保在外部瀏覽器也能要求登入
          liff.login();
        }
      } catch (err) {
        alert("LIFF 初始化失敗：" + err);
      }
    }

    initializeLiff();

    // 處理表單送出
    document.getElementById("orderForm").addEventListener("submit", async function(e) {
      e.preventDefault(); // 防止網頁重整
      
      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      submitBtn.innerText = "資料傳送中...";

      // 收集表單資料
      const payload = {
        userId: profileData.userId || "未授權",
        userName: profileData.displayName || "未授權",
        purpose: document.getElementById("purpose").value,
        customerName: document.getElementById("customerName").value,
        amount: document.getElementById("amount").value,
        region: document.getElementById("region").value,
        orderType: document.getElementById("orderType").value,
        phone: document.getElementById("phone").value
      };

      try {
        // 將資料 POST 到 Google Apps Script
        const response = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify(payload),
          headers: {
            "Content-Type": "text/plain;charset=utf-8" // 避免 GAS CORS 問題，用 text/plain 傳送
          }
        });

        const result = await response.json();
        
        if (result.status === "success") {
          alert("資料建立成功！");
          // 傳送一個訊息到聊天室，讓群組/機器人知道已送出
          if (liff.isInClient()) {
            await liff.sendMessages([{
              type: "text",
              text: `已透過系統建立一筆 ${payload.customerName} 的單據`
            }]);
            liff.closeWindow(); // 關閉 LIFF 視窗
          }
        } else {
          alert("寫入失敗：" + result.message);
          submitBtn.disabled = false;
          submitBtn.innerText = "重新送出";
        }
      } catch (error) {
        alert("網路錯誤，請稍後再試：" + error);
        submitBtn.disabled = false;
        submitBtn.innerText = "重新送出";
      }
    });
  </script>
</body>
</html>
